version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: omnitrader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnitrader-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - data_volume:/app/data
      - reports_volume:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
      "

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnitrader-celery
    env_file:
      - .env
    volumes:
      - .:/app
      - data_volume:/app/data
      - reports_volume:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      celery -A src.main.celery_app worker \
        --loglevel=info \
        --concurrency=4 \
        --pool=prefork

volumes:
  redis_data:
  data_volume:
  reports_volume:
